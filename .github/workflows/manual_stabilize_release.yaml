name: Stabilize Release (create release branch)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  get-version:
    uses: ./.github/workflows/common_get_version.yaml

  create-release-branch:
    runs-on: ubuntu-latest
    needs: get-version
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - uses: ./.github/actions/setup-repo

      - uses: peterjgrainger/action-create-branch@v4.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN_BRANCH }}
        with:
          branch: 'refs/heads/release/${{ needs.get-version.outputs.release-minor }}'
